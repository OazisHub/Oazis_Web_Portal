version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: oasis-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oasis}
      POSTGRES_USER: ${POSTGRES_USER:-oasis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oasis}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    container_name: oasis-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

  solana-listener:
    build:
      context: ./backend/listener
    container_name: oasis-listener
    environment:
      LISTENER_PORT: ${LISTENER_PORT:-8101}
      LISTENER_MOCK_MODE: ${LISTENER_MOCK_MODE:-true}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL}
      SOLANA_WS_URL: ${SOLANA_WS_URL}
      SOLANA_PROGRAM_IDS: ${SOLANA_PROGRAM_IDS}
    ports:
      - "${LISTENER_PORT:-8101}:8101"
    depends_on:
      - redis
      - postgres

  ai-orchestrator:
    build:
      context: ./backend/orchestrator
    container_name: oasis-orchestrator
    environment:
      ORCHESTRATOR_PORT: ${ORCHESTRATOR_PORT:-8102}
      AI_MOCK_MODE: ${AI_MOCK_MODE:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL}
    ports:
      - "${ORCHESTRATOR_PORT:-8102}:8102"
    depends_on:
      - redis
      - postgres
      - solana-listener

  portal-frontend-3d:
    build:
      context: ./frontend/portal
    container_name: oasis-portal
    environment:
      PORTAL_PORT: ${PORTAL_PORT:-8103}
      ORCHESTRATOR_BASE_URL: http://ai-orchestrator:8102
    ports:
      - "${PORTAL_PORT:-8103}:8103"
    depends_on:
      - ai-orchestrator

volumes:
  postgres_data:
