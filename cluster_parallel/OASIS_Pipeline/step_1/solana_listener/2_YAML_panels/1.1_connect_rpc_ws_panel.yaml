schema: step_panel.v4
panel_meta:
  panel_version: "v4"
  logic_version: "0.0.1"
  step_id: "1.1"
  step_name: "1.1_connect_rpc_ws"
  step_family: "v4"
  module_id: "solana_listener"
  notes_ru: "Connect and health-check Solana RPC/WS endpoints."
anchors:
  media_bank: "3_Media_Bank"
  runtime: "3_Media_Bank/0_local_runtime"
  pointers: "3_Media_Bank/0_local_runtime/active_job"
  temp: "3_Media_Bank/0_local_runtime/tmp"
paths:
  input:
    mode: "stream"
    _mode_enum: ["single", "batch", "stream"]
    input_dir: null
    input_file: null
  job_root:
    path: "3_Runtime/solana_listener/jobs/{job_id}"
  step_run_root:
    path: "3_Runtime/solana_listener/steps/1_1"
  active_job_path:
    path: "3_Media_Bank/0_local_runtime/active_job/active_job.json"
runtime:
  ensure_dirs: true
  log_level: "info"
  fail_on_missing_input: false
  exists_policy: "overwrite"
  _exists_policy_enum: ["skip", "overwrite", "error"]
network:
  mock_mode: true
  solana:
    rpc_http_url: "https://api.mainnet-beta.solana.com"
    ws_url: "wss://api.mainnet-beta.solana.com"
    connect_timeout_ms: 4000
output_artifacts:
  step_result:
    enabled: true
    root_key: "step_run_root"
    relative_path: "meta/result.json"
meta_output:
  enabled: true
  root_key: "step_run_root"
  relative_path: "run_meta.json"
  include:
    contract_version: true
    logic_version: true
    panel_version: true
    step_id: true
    step_name: true
    panel_path: true
    input_paths: true
    output_paths: true
    runtime: true
    warnings: true
