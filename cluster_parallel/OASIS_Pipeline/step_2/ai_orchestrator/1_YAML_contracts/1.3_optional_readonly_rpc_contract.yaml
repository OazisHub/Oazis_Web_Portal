schema: step_contract.v4
contract_meta:
  contract_version: "4.0.0"
  step_id: "1.3"
  step_name: "1.3_optional_readonly_rpc"
  python_min_version: "3.11"
execution:
  required_chain:
    - a_bootstrap
    - b_panel_locator
    - c_job_descriptor
    - d_job_path_resolver
paths:
  input:
    mode_enum: ["single", "batch", "stream"]
  job_root:
    must_contain_job_id_in_batch: true
output_artifacts:
  required_for_any_disk_write: true
ai_rules:
  ai_optional: true
  ai_enabled_only_via_panel: true
meta_output:
  required: true
