schema: step_panel.v4
panel_meta:
  panel_version: "v4"
  logic_version: "0.0.1"
  step_id: "1.3"
  step_name: "1.3_optional_readonly_rpc"
  step_family: "v4"
  module_id: "ai_orchestrator"
  notes_ru: "Optional read-only RPC enrichment for advisory context."
anchors:
  media_bank: "3_Media_Bank"
  runtime: "3_Media_Bank/0_local_runtime"
  pointers: "3_Media_Bank/0_local_runtime/active_job"
  temp: "3_Media_Bank/0_local_runtime/tmp"
paths:
  input:
    mode: "stream"
    _mode_enum: ["single", "batch", "stream"]
    input_dir: null
    input_file: null
  job_root:
    path: "3_Runtime/ai_orchestrator/jobs/{job_id}"
  step_run_root:
    path: "3_Runtime/ai_orchestrator/steps/1_3"
  active_job_path:
    path: "3_Media_Bank/0_local_runtime/active_job/active_job.json"
runtime:
  ensure_dirs: true
  log_level: "info"
  fail_on_missing_input: false
  exists_policy: "overwrite"
  _exists_policy_enum: ["skip", "overwrite", "error"]
rpc:
  enabled: true
  mock_mode: true
  rpc_http_url: "https://api.mainnet-beta.solana.com"
  method: "getEpochInfo"
  params: []
  timeout_sec: 8
  fallback_mock_response:
    absoluteSlot: 123456789
    blockHeight: 111111111
    epoch: 622
    slotIndex: 12345
ai:
  enabled: false
  provider: "openai"
  model: "gpt-4.1-mini"
  policy:
    mode: "judge"
    _mode_enum: ["generate", "judge", "hybrid"]
  budget:
    max_calls: 1
    max_tokens: 1200
    timeout_sec: 60
    retries: 1
output_artifacts:
  rpc_snapshot:
    enabled: true
    root_key: "step_run_root"
    relative_path: "data/rpc_snapshot.json"
  advisory_result:
    enabled: true
    root_key: "step_run_root"
    relative_path: "meta/result.json"
meta_output:
  enabled: true
  root_key: "step_run_root"
  relative_path: "run_meta.json"
  include:
    contract_version: true
    logic_version: true
    panel_version: true
    step_id: true
    step_name: true
    panel_path: true
    input_paths: true
    output_paths: true
    runtime: true
    warnings: true
