schema: step_panel.v4
panel_meta:
  panel_version: "v4"
  logic_version: "0.0.1"
  step_id: "1.4"
  step_name: "1.4_avatar_react"
  step_family: "v4"
  module_id: "portal_frontend_3d"
  notes_ru: "Read ui_signal and expose final avatar state for web portal polling."
anchors:
  media_bank: "3_Media_Bank"
  runtime: "3_Media_Bank/0_local_runtime"
  pointers: "3_Media_Bank/0_local_runtime/active_job"
  temp: "3_Media_Bank/0_local_runtime/tmp"
paths:
  input:
    mode: "single"
    _mode_enum: ["single", "batch", "stream"]
    input_dir: null
    input_file: null
  job_root:
    path: "3_Runtime/portal_frontend_3d/jobs/{job_id}"
  step_run_root:
    path: "3_Runtime/portal_frontend_3d/steps/1_4"
  active_job_path:
    path: "3_Media_Bank/0_local_runtime/active_job/active_job.json"
runtime:
  ensure_dirs: true
  log_level: "info"
  fail_on_missing_input: false
  exists_policy: "overwrite"
  _exists_policy_enum: ["skip", "overwrite", "error"]
avatar:
  ui_signal_input_file: "3_Runtime/ai_orchestrator/steps/1_6/data/ui_signal.json"
  avatar_state_output_file: "3_Runtime/portal_frontend_3d/portal_state/avatar_state.json"
output_artifacts:
  avatar_state:
    enabled: true
    root_key: "step_run_root"
    relative_path: "data/avatar_state.json"
  step_result:
    enabled: true
    root_key: "step_run_root"
    relative_path: "meta/result.json"
meta_output:
  enabled: true
  root_key: "step_run_root"
  relative_path: "run_meta.json"
  include:
    contract_version: true
    logic_version: true
    panel_version: true
    step_id: true
    step_name: true
    panel_path: true
    input_paths: true
    output_paths: true
    runtime: true
    warnings: true
