name: oazis-web-portal-ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compose config check
        run: docker compose config >/dev/null

      - name: Python syntax check
        run: python -m py_compile backend/orchestrator/app/main.py

      - name: Node syntax check
        run: |
          node --check backend/listener/src/index.js
          node --check frontend/portal/server.js

      - name: Smoke script syntax
        run: bash -n scripts/smoke.sh

  compose-smoke:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare env
        run: |
          cp .env.example .env
          chmod +x scripts/smoke.sh

      - name: Build and start
        run: docker compose up -d --build

      - name: Wait for services
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8101/health >/dev/null \
              && curl -fsS http://localhost:8102/health >/dev/null \
              && curl -fsS http://localhost:8103/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Services did not become healthy in time" >&2
          exit 1

      - name: Run smoke
        run: make smoke

      - name: Show compose logs on failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Stop compose
        if: always()
        run: docker compose down -v
